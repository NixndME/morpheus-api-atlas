apiVersion: apps/v1
kind: Deployment
metadata:
  name: morpheus-api-atlas
  namespace: morpheus-api-atlas
  labels:
    app: morpheus-api-atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: morpheus-api-atlas
  template:
    metadata:
      labels:
        app: morpheus-api-atlas
    spec:
      restartPolicy: Always
      containers:
      - name: atlas
        image: nixndme/morpheus-api-atlas:3
        ports:
        - containerPort: 2222
          protocol: TCP
        env:
        - name: PORT
          value: "2222"
        resources:
          requests:
            cpu: "200m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 2222
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 2222
          initialDelaySeconds: 10
          periodSeconds: 10
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
